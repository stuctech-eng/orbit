<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ORBIT</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<meta name="background-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
<style>
  :root { color-scheme: dark; }
  html, body {
    position: fixed;
    inset: 0;
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000000;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #stage {
    position: fixed;
    inset: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    overscroll-behavior: none;
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
</div>

<script>
(function () {
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  let dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
  let W = 0, H = 0;

  function resize() {
    // visualViewport reflects the ACTUAL visible area on iOS (accounting for
    // dynamic browser chrome, keyboard, etc.) — clientWidth/clientHeight
    // reflect the layout viewport, which can be larger than what's actually
    // visible. That mismatch is the more likely reason cells kept appearing
    // to sink below the visible screen even after the padding fix.
    const vv = window.visualViewport;
    const cs = getComputedStyle(stage);
    const padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
    const padY = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
    const vw = vv ? vv.width : stage.clientWidth;
    const vh = vv ? vv.height : stage.clientHeight;
    W = vw - padX;
    H = vh - padY;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resize);
    window.visualViewport.addEventListener('scroll', resize);
  }
  resize();

  // ---------- Audio ----------
  let actx = null;
  function ensureAudio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    } else if (actx.state === 'suspended') {
      actx.resume();
    }
  }
  function tone(freq, dur, vol, type) {
    if (!actx) return;
    const t0 = actx.currentTime;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(actx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }
  function playCorrect() { tone(880, 0.35, 0.05, 'sine'); tone(1320, 0.3, 0.03, 'sine'); }
  function playWrong() {
    tone(340, 0.16, 0.05, 'triangle');
    setTimeout(() => tone(230, 0.3, 0.055, 'triangle'), 90);
  }
  function playTick() { tone(600, 0.08, 0.02, 'sine'); }

  function haptic(pattern) {
    if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
  }

  // ---------- Utility ----------
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
  function now() { return performance.now(); }

  // ---------- Adaptive Memory Ladder ----------
  // Straight from the MASTER GAME FLOW doc: alternates between Tracking
  // (more cells, 1 digit) and Memory (fewer cells, more digits) phases.
  // Deterministic step-through for now — the Cognitive Engine (performance-
  // based speed-up/slow-down) is a separate future layer on top of this.
  const LADDER = [
    // Phase A — Tracking
    { cells: 3, digits: 1 }, { cells: 4, digits: 1 }, { cells: 5, digits: 1 },
    { cells: 6, digits: 1 }, { cells: 7, digits: 1 }, { cells: 8, digits: 1 },
    // Phase B — Memory
    { cells: 5, digits: 2 }, { cells: 6, digits: 2 }, { cells: 7, digits: 2 },
    // Phase C — Tracking
    { cells: 8, digits: 2 }, { cells: 9, digits: 2 }, { cells: 10, digits: 2 },
    // Phase D — Memory
    { cells: 6, digits: 3 }, { cells: 7, digits: 3 }, { cells: 8, digits: 3 },
    // Phase E — Tracking
    { cells: 9, digits: 3 }, { cells: 10, digits: 3 }, { cells: 11, digits: 3 }
  ];
  let ladderIndex = 0;

  // ---------- Cells ----------
  let cells = [];
  let baseRadius = 34;
  let numCells = 3;

  function computeRadius(n) {
    const scale = Math.min(W, H);
    // Shrinks as the cell count grows so more cells fit comfortably —
    // area occupied scales down roughly with sqrt(3/n).
    const factor = Math.sqrt(3 / n);
    baseRadius = Math.max(32, Math.min(72, scale * 0.125 * factor));
  }

  function makeCell(x, y) {
    const speed = rand(24, 36);
    const angle = rand(0, Math.PI * 2);
    return {
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: baseRadius,
      glow: 0,          // ambient pulse
      reveal: 0,         // 0..1 opacity of digit reveal
      revealUntil: 0,
      revealed: false,   // whether this cell has already shown its content this round
      found: false,      // whether the player has already correctly tapped this cell this round
      burst: 0,          // 0..1 brief scanner-intensity flash at the detection moment
      feedback: 0,        // 0..1 feedback pulse amount
      feedbackColor: null,
      digit: null,
      dying: false,      // true while fading out after being dropped by the ladder
      fadeStart: 0
    };
  }

  const FADE_DURATION = 550; // ms for a departing cell to fade out

  let gameStarted = false;

  function spawnTriangle() {
    // Calm, intentional composition for the very first round only: one cell
    // above, two below, forming a triangle. A touch of jitter keeps it organic.
    const jitter = () => rand(-14, 14);
    const cx = W * 0.5;
    const topY = H * 0.34;
    const bottomY = H * 0.62;
    const spread = Math.min(W * 0.19, H * 0.16, baseRadius * 2.6);
    const positions = [
      { x: cx + jitter(),          y: topY + jitter() },
      { x: cx - spread + jitter(), y: bottomY + jitter() },
      { x: cx + spread + jitter(), y: bottomY + jitter() }
    ];
    for (const p of positions) {
      const x = Math.min(Math.max(p.x, baseRadius * 1.5), W - baseRadius * 1.5);
      const y = Math.min(Math.max(p.y, baseRadius * 1.5), H - baseRadius * 1.5);
      cells.push(makeCell(x, y));
    }
  }

  // Adjusts the live cell count for the new round WITHOUT resetting
  // everything: existing cells keep their position and velocity (the board
  // never jarringly "refreshes"), only the difference between rounds is
  // added or removed.
  function adjustCellCount(n) {
    computeRadius(n);
    for (const c of cells) if (!c.dying) c.r = baseRadius; // radius adapts to new density, but not for cells already fading out

    if (!gameStarted) {
      cells = [];
      spawnTriangle();
      gameStarted = true;
      return;
    }

    const activeIndices = [];
    for (let i = 0; i < cells.length; i++) if (!cells[i].dying) activeIndices.push(i);
    const activeCount = activeIndices.length;

    if (activeCount < n) {
      const margin = baseRadius * 1.4;
      const toAdd = n - activeCount;
      for (let k = 0; k < toAdd; k++) {
        let placed = false;
        for (let attempt = 0; attempt < 200 && !placed; attempt++) {
          const x = rand(margin, W - margin);
          const y = rand(margin, H - margin);
          let ok = true;
          for (const c of cells) {
            if (Math.hypot(x - c.x, y - c.y) < baseRadius * 2.3) { ok = false; break; }
          }
          if (ok) { cells.push(makeCell(x, y)); placed = true; }
        }
        if (!placed) cells.push(makeCell(rand(margin, W - margin), rand(margin, H - margin)));
      }
    } else if (activeCount > n) {
      // Don't remove instantly — mark the excess as dying so they fade out
      // over FADE_DURATION while still drifting naturally. They're purged
      // from the array once fully faded (see frame()).
      let toRemove = activeCount - n;
      while (toRemove > 0 && activeIndices.length > 0) {
        const pick = Math.floor(rand(0, activeIndices.length));
        const idx = activeIndices.splice(pick, 1)[0];
        cells[idx].dying = true;
        cells[idx].fadeStart = now();
        toRemove--;
      }
    }
  }

  // Returns the indices of cells currently participating in the round
  // (i.e. not fading out) — used for target/digit selection and tap hits.
  function activeCellIndices() {
    const out = [];
    for (let i = 0; i < cells.length; i++) if (!cells[i].dying) out.push(i);
    return out;
  }

  // ---------- Physics ----------
  function stepPhysics(dt) {
    for (const c of cells) {
      c.x += c.vx * dt;
      c.y += c.vy * dt;

      const pad = c.r;
      if (c.x < pad) { c.x = pad; c.vx = Math.abs(c.vx); }
      if (c.x > W - pad) { c.x = W - pad; c.vx = -Math.abs(c.vx); }
      if (c.y < pad) { c.y = pad; c.vy = Math.abs(c.vy); }
      if (c.y > H - pad) { c.y = H - pad; c.vy = -Math.abs(c.vy); }
    }

    // pairwise soft collisions
    for (let i = 0; i < cells.length; i++) {
      for (let j = i + 1; j < cells.length; j++) {
        const a = cells[i], b = cells[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.hypot(dx, dy);
        const minDist = a.r + b.r + 14;
        if (dist < minDist && dist > 0.0001) {
          const nx = dx / dist, ny = dy / dist;
          // separate
          const overlap = (minDist - dist) / 2;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;
          // elastic exchange along normal (equal mass)
          const avn = a.vx * nx + a.vy * ny;
          const bvn = b.vx * nx + b.vy * ny;
          const diff = bvn - avn;
          a.vx += diff * nx; a.vy += diff * ny;
          b.vx -= diff * nx; b.vy -= diff * ny;
        }
      }
    }

    // Collision separation above can push a cell past a wall boundary after
    // the earlier wall-clamp already ran this frame (it only checks pairwise
    // distance, not screen bounds). Re-clamp everyone here so no cell ever
    // renders outside the visible play area, even mid-collision near an edge.
    for (const c of cells) {
      const pad = c.r;
      if (c.x < pad) { c.x = pad; if (c.vx < 0) c.vx = Math.abs(c.vx); }
      if (c.x > W - pad) { c.x = W - pad; if (c.vx > 0) c.vx = -Math.abs(c.vx); }
      if (c.y < pad) { c.y = pad; if (c.vy < 0) c.vy = Math.abs(c.vy); }
      if (c.y > H - pad) { c.y = H - pad; if (c.vy > 0) c.vy = -Math.abs(c.vy); }
    }
  }

  // ---------- Game state ----------
  const PHASE = { INTRO: 'intro', SCAN: 'scan', MEMORY: 'memory', FEEDBACK: 'feedback' };
  let phase = PHASE.INTRO;
  let phaseStart = 0;

  let scanY = 0;
  let scanDuration = 0;
  let roundTargets = new Set();  // indices of cells holding a digit this round
  let roundFound = 0;            // how many of those have been correctly tapped so far

  const INTRO_DELAY = 350;
  const FEEDBACK_DURATION = 500;
  const REVEAL_DURATION = 600; // ms digit stays visible
  const REVEAL_TOLERANCE = 10; // px band around scan line to trigger reveal

  // Locked to one exact, constant speed — no randomness left in it at all.
  const SCAN_CROSS_DURATION = 4500; // ms to cross the visible screen (H)

  function startRound() {
    phase = PHASE.INTRO;
    phaseStart = now();

    const step = LADDER[ladderIndex % LADDER.length];
    ladderIndex++;
    numCells = step.cells;

    adjustCellCount(numCells);

    // pick `step.digits` unique ACTIVE cells to hold a number this round —
    // never a cell that's currently fading out
    const indices = activeCellIndices();
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(rand(0, i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    roundTargets = new Set(indices.slice(0, step.digits));
    roundFound = 0;

    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      if (c.dying) continue; // leave fading cells alone — they're not part of this round
      c.digit = roundTargets.has(i) ? Math.floor(rand(0, 10)) : null;
      c.reveal = 0;
      c.revealed = false;
      c.found = false;
      c.feedback = 0;
      c.feedbackColor = null;
    }
  }

  function beginScan() {
    phase = PHASE.SCAN;
    phaseStart = now();
    scanY = H + SCAN_START_OFFSET;
    // The extra off-screen padding needed for the trail travels at that same
    // fixed speed, added proportionally, so trail length never changes it.
    const travel = H + SCAN_START_OFFSET * 2;
    scanDuration = SCAN_CROSS_DURATION * (travel / H);
  }

  function beginMemory() {
    phase = PHASE.MEMORY;
    phaseStart = now();
  }

  function beginFeedback(correct, cellIndex) {
    phase = PHASE.FEEDBACK;
    phaseStart = now();
    const c = cells[cellIndex];
    c.feedback = 1;
    c.feedbackColor = correct ? 'white' : 'red';
    if (correct) { playCorrect(); haptic(12); }
    else { playWrong(); haptic([10, 40, 10]); }
  }

  // A correct tap that isn't the round's last remaining target — the round
  // continues, but the cell still gets its own pulse of confirmation.
  function pulseFound(cellIndex) {
    const c = cells[cellIndex];
    c.feedback = 1;
    c.feedbackColor = 'white';
    playCorrect();
    haptic(10);
  }

  // ---------- Interaction ----------
  function handleTap(clientX, clientY) {
    ensureAudio();
    if (phase !== PHASE.MEMORY && phase !== PHASE.SCAN) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    let hitIndex = -1;
    let bestDist = Infinity;
    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      if (c.dying) continue;
      const d = Math.hypot(x - c.x, y - c.y);
      if (d <= c.r * 1.6 && d < bestDist) { bestDist = d; hitIndex = i; }
    }
    if (hitIndex === -1) return;

    const c = cells[hitIndex];
    const isTarget = roundTargets.has(hitIndex) && !c.found;

    if (isTarget) {
      c.found = true;
      roundFound++;
      if (roundFound >= roundTargets.size) {
        // last target found — round complete, success
        beginFeedback(true, hitIndex);
      } else {
        // more targets still to find — stay in memory phase
        pulseFound(hitIndex);
      }
    } else {
      // wrong cell (or an already-found one tapped again) — round over
      beginFeedback(false, hitIndex);
    }
  }

  canvas.addEventListener('pointerdown', (e) => {
    ensureAudio();
    handleTap(e.clientX, e.clientY);
  }, { passive: true });

  // ---------- Rendering ----------
  function drawBackground() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
  }

  function drawCell(c) {
    const t = now();

    // ambient breathing glow
    c.glow = 0.5 + 0.5 * Math.sin(t / 1400 + (c.x + c.y) * 0.001);

    // feedback decay
    if (c.feedback > 0) {
      c.feedback -= 0.028;
      if (c.feedback < 0) c.feedback = 0;
    }

    // burst decay — the brief flare when the scanner detects this cell
    if (c.burst > 0) {
      c.burst -= 0.045;
      if (c.burst < 0) c.burst = 0;
    }

    ctx.save();
    ctx.translate(c.x, c.y);

    if (c.dying) {
      const fadeProgress = Math.min(1, (t - c.fadeStart) / FADE_DURATION);
      var fadeAlpha = Math.max(0, 1 - fadeProgress);
      ctx.globalAlpha = fadeAlpha;
    } else {
      var fadeAlpha = 1;
    }

    // feedback ring
    if (c.feedback > 0) {
      const isWrong = c.feedbackColor === 'red';
      const ringR = c.r + (1 - c.feedback) * (isWrong ? 58 : 46);
      const alpha = c.feedback * (isWrong ? 0.75 : 0.55);

      // secondary soft red bloom behind the ring — makes a wrong tap read
      // clearly without becoming harsh or flashy
      if (isWrong) {
        const bloomR = c.r * (1.4 + (1 - c.feedback) * 0.5);
        const bloom = ctx.createRadialGradient(0, 0, c.r * 0.6, 0, 0, bloomR);
        bloom.addColorStop(0, `rgba(255,60,60,${c.feedback * 0.28})`);
        bloom.addColorStop(1, 'rgba(255,60,60,0)');
        ctx.fillStyle = bloom;
        ctx.beginPath();
        ctx.arc(0, 0, bloomR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(0, 0, ringR, 0, Math.PI * 2);
      ctx.lineWidth = isWrong ? 4 : 3;
      ctx.strokeStyle = c.feedbackColor === 'white'
        ? `rgba(255,255,255,${alpha})`
        : `rgba(255,64,64,${alpha})`;
      ctx.shadowColor = c.feedbackColor === 'white' ? 'rgba(255,255,255,0.8)' : 'rgba(255,64,64,0.95)';
      ctx.shadowBlur = isWrong ? 26 : 18;
      ctx.stroke();
    }

    // outer glow — intensifies sharply during the burst, gently during reveal
    ctx.shadowColor = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 20 + c.glow * 9 + c.reveal * 22 + c.burst * 40;

    const revealScale = 1 + c.reveal * 0.08 + c.burst * 0.06;
    const R = c.r * revealScale;

    // soft pearl material: minimal, smooth, barely-there sheen — brightens
    // toward pure white during a reveal for the "glowing from within" moment
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    const lift = c.reveal * 0.5 + c.burst * 0.5;
    const material = ctx.createRadialGradient(
      -R * 0.15, -R * 0.2, R * 0.2,
      0, 0, R * 1.05
    );
    material.addColorStop(0, `rgba(255,255,255,${0.97 + lift * 0.03})`);
    material.addColorStop(0.7, `rgba(${240 + lift * 15},${240 + lift * 15},${244 + lift * 11},0.95)`);
    material.addColorStop(1, `rgba(${222 + lift * 33},${224 + lift * 31},${230 + lift * 25},${0.92 + lift * 0.06})`);
    ctx.fillStyle = material;
    ctx.fill();

    ctx.shadowBlur = 0;

    // barely-there sheen — soft, broad, no hard glint
    ctx.beginPath();
    ctx.ellipse(-R * 0.2, -R * 0.24, R * 0.34, R * 0.22, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.2 + lift * 0.15})`;
    ctx.fill();

    // digit reveal — slight scale-in gives a sense of depth, of looking into the cell
    if (c.reveal > 0 && c.digit !== null) {
      ctx.globalAlpha = c.reveal;
      const digitScale = 0.88 + c.reveal * 0.12;
      ctx.save();
      ctx.scale(digitScale, digitScale);
      ctx.fillStyle = '#000000';
      ctx.font = `600 ${Math.floor(c.r * 1.05)}px -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(c.digit), 0, c.r * 0.06);
      ctx.restore();
      ctx.globalAlpha = fadeAlpha;
    }

    ctx.restore();
  }

  const SCAN_CORE_WIDTH = 2;    // aura width around the hairline — kept tight, not thick
  const SCAN_LEAD = 10;          // tight fade just ahead of the core (direction of travel)
  const SCAN_TRAIL = 140;        // long billowing trail behind it
  const SCAN_START_OFFSET = SCAN_TRAIL + 30; // keep fully off-screen at both ends

  function drawScan() {
    if (phase !== PHASE.SCAN) return;
    const t = now();
    ctx.save();

    // Subtle, irregular flicker — feels like energy running through the
    // beam, without ever becoming distracting or strobe-like
    const flicker = 0.88
      + 0.09 * Math.sin(t * 0.0075)
      + 0.05 * Math.sin(t * 0.0331 + 1.7);

    // Asymmetric streak: almost no glow ahead of the core (it's heading
    // into darkness), but a long trail behind it that flares brightest
    // just behind the core — as if the energy billows out — then wanes
    // gradually to nothing.
    const top = scanY - SCAN_LEAD;
    const bottom = scanY + SCAN_TRAIL;
    const span = bottom - top;
    const corePos = SCAN_LEAD / span;

    const grad = ctx.createLinearGradient(0, top, 0, bottom);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(Math.max(0, corePos - 0.03), `rgba(255,255,255,${0.05 * flicker})`);
    grad.addColorStop(corePos, `rgba(255,255,255,${0.34 * flicker})`);
    const trailStops = [
      [0.08, 0.30], [0.22, 0.22], [0.42, 0.13], [0.64, 0.07], [0.85, 0.025], [1.0, 0]
    ];
    for (const [frac, alpha] of trailStops) {
      const pos = Math.min(1, corePos + frac * (1 - corePos));
      grad.addColorStop(pos, `rgba(255,255,255,${alpha * flicker})`);
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, top, W, span);

    // Soft aura behind the core — gives it bloom without softening the edge itself
    ctx.shadowColor = 'rgba(255,255,255,0.9)';
    ctx.shadowBlur = 16 * flicker;
    ctx.fillStyle = `rgba(255,255,255,${0.45 * flicker})`;
    ctx.fillRect(0, scanY - SCAN_CORE_WIDTH / 2, W, SCAN_CORE_WIDTH);
    ctx.shadowBlur = 0;

    // Razor-sharp hairline on top — pixel-snapped, no blur, flinterdun and near-white-hot
    const coreY = Math.round(scanY);
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, 1.0 * flicker)})`;
    ctx.fillRect(0, coreY, W, 1);

    drawScanBursts();
    ctx.restore();
  }

  function drawScanBursts() {
    // The cell itself lights up from within right as the beam finds it —
    // the digit appears exactly in the core of the scan
    for (const c of cells) {
      if (c.burst > 0) {
        const bx = c.x, by = c.y;
        const r = c.r * (2.4 + c.burst * 1.4);
        const hot = ctx.createRadialGradient(bx, by, 0, bx, by, r);
        const a = c.burst * 0.5;
        hot.addColorStop(0, `rgba(255,255,255,${a})`);
        hot.addColorStop(0.5, `rgba(255,255,255,${a * 0.35})`);
        hot.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hot;
        ctx.beginPath();
        ctx.arc(bx, by, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ---------- Main loop ----------
  let lastT = now();

  function updateScan(t) {
    const elapsed = t - phaseStart;
    const prog = Math.min(1, elapsed / scanDuration);
    const travel = H + SCAN_START_OFFSET * 2;
    // Linear, not eased — a real scanner sweeps at one constant speed,
    // it doesn't slow down at the start/end of its pass.
    scanY = H + SCAN_START_OFFSET - prog * travel;

    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      if (!c.revealed && c.digit !== null) {
        if (Math.abs(c.y - scanY) < REVEAL_TOLERANCE + c.r * 0.5) {
          c.revealed = true;
          c.revealUntil = t + REVEAL_DURATION;
          c.burst = 1;
          playTick();
        }
      }
      if (c.revealed && c.revealUntil > 0) {
        const remain = c.revealUntil - t;
        if (remain > 0) {
          const elapsedFrac = 1 - (remain / REVEAL_DURATION); // 0 -> 1
          if (elapsedFrac < 0.15) c.reveal = elapsedFrac / 0.15;
          else if (elapsedFrac > 0.85) c.reveal = (1 - elapsedFrac) / 0.15;
          else c.reveal = 1;
        } else {
          c.reveal = 0;
        }
      }
    }

    if (prog >= 1) {
      for (const c of cells) c.reveal = 0;
      beginMemory();
    }
  }

  function frame() {
    const t = now();
    const dt = Math.min(0.032, (t - lastT) / 1000);
    lastT = t;

    stepPhysics(dt);
    drawBackground();

    if (phase === PHASE.INTRO) {
      if (t - phaseStart > INTRO_DELAY) beginScan();
    } else if (phase === PHASE.SCAN) {
      updateScan(t);
    } else if (phase === PHASE.FEEDBACK) {
      if (t - phaseStart > FEEDBACK_DURATION) startRound();
    }

    drawScan();
    for (const c of cells) drawCell(c);

    // Purge cells that finished fading out (they've already had their
    // last, fully-transparent frame rendered above).
    if (cells.some((c) => c.dying && (t - c.fadeStart) >= FADE_DURATION)) {
      cells = cells.filter((c) => !(c.dying && (t - c.fadeStart) >= FADE_DURATION));
    }

    requestAnimationFrame(frame);
  }

  startRound();
  requestAnimationFrame(frame);

  // Kick audio context on first interaction (iOS requirement)
  window.addEventListener('pointerdown', ensureAudio, { once: true });

  // Belt-and-suspenders against iOS Safari's bounce/rubber-band scroll,
  // which can shift the whole page during a drag even with touch-action:
  // none in some standalone-PWA edge cases — this is very likely what
  // looked like cells "sinking below the screen" during interaction.
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gesturestart', (e) => e.preventDefault());
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
