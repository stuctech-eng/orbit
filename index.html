<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ORBIT</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<meta name="background-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
<style>
  :root { color-scheme: dark; }
  html, body {
    position: fixed;
    inset: 0;
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000000;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #stage {
    position: fixed;
    inset: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    overscroll-behavior: none;
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #welcome {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    color: #ffffff;
    opacity: 1;
    transition: opacity 0.4s ease;
  }
  #welcome.hidden { opacity: 0; pointer-events: none; }
  #welcome .title {
    font-size: 15px;
    letter-spacing: 0.28em;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 46px;
  }
  #welcome .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 56px;
    margin-bottom: 56px;
  }
  #welcome .stat { text-align: center; }
  #welcome .stat .value {
    font-size: 28px;
    font-weight: 300;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
  }
  #welcome .stat .label {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
    text-transform: uppercase;
  }
  #welcome button {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.05);
    color: #ffffff;
    font-size: 14px;
    letter-spacing: 0.06em;
    font-family: inherit;
    padding: 16px 40px;
    border-radius: 999px;
    min-height: 44px;
  }
  #welcome button:active { background: rgba(255,255,255,0.15); }
  #welcome .menuStack {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 220px;
  }

  /* The single subtle interaction point during gameplay — styled like the
     scanner itself, not like a UI control. */
  #scannerIndicator {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 0; right: 0;
    height: 44px; /* generous tap target */
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0;
  }
  #scannerIndicator .line {
    width: 72px;
    height: 1px;
    background: rgba(255,255,255,0.22);
    box-shadow: 0 0 6px rgba(255,255,255,0.25);
    transition: opacity 0.2s ease;
  }
  #scannerIndicator:active .line { opacity: 0.6; }
  #scannerIndicator.hidden { display: none; }

  #pauseOverlay {
    position: fixed;
    inset: 0;
    z-index: 25;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #pauseOverlay.visible { opacity: 1; pointer-events: auto; }
  #pauseOverlay .menuStack {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 220px;
  }
  #pauseOverlay button {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.04);
    color: #ffffff;
    font-size: 14px;
    letter-spacing: 0.04em;
    font-family: inherit;
    padding: 15px 0;
    border-radius: 999px;
    min-height: 44px;
  }
  #pauseOverlay button:active { background: rgba(255,255,255,0.14); }

  #settingsOverlay {
    position: fixed;
    inset: 0;
    z-index: 26;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    color: #ffffff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #settingsOverlay.visible { opacity: 1; pointer-events: auto; }
  #settingsOverlay .title {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  #settingsOverlay .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 220px;
    padding: 16px 2px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 15px;
    margin-bottom: 24px;
  }
  #settingsOverlay .toggle {
    width: 50px; height: 30px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
    border: none;
    position: relative;
    flex-shrink: 0;
  }
  #settingsOverlay .toggle .knob {
    position: absolute;
    top: 3px; left: 3px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.15s ease;
  }
  #settingsOverlay .toggle.on { background: rgba(255,255,255,0.85); }
  #settingsOverlay .toggle.on .knob { transform: translateX(20px); background: #000; }
  #settingsOverlay button.close {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 14px;
    padding: 14px 0;
    border-radius: 999px;
    min-height: 44px;
    width: 220px;
  }

  #statsOverlay {
    position: fixed;
    inset: 0;
    z-index: 26;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    color: #ffffff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #statsOverlay.visible { opacity: 1; pointer-events: auto; }
  #statsOverlay .title {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  #statsOverlay .statRow {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    width: 240px;
    padding: 14px 2px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #statsOverlay .statRow .label {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  #statsOverlay .statRow .value {
    font-size: 17px;
    font-weight: 300;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }
  #statsOverlay button.close {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 14px;
    padding: 14px 0;
    border-radius: 999px;
    min-height: 44px;
    width: 220px;
    margin-top: 28px;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
</div>
<button id="scannerIndicator" aria-label="Menu"><span class="line"></span></button>
<div id="welcome" class="hidden">
  <div class="title">ORBIT</div>
  <div class="stats">
    <div class="stat"><div class="value" id="statLevel">–</div><div class="label">Level</div></div>
    <div class="stat"><div class="value" id="statHighLevel">–</div><div class="label">Hoogste level</div></div>
    <div class="stat"><div class="value" id="statScore">–</div><div class="label">Hoogste score</div></div>
    <div class="stat"><div class="value" id="statRating">–</div><div class="label">Cognitive Rating</div></div>
  </div>
  <div class="menuStack">
    <button id="resumeBtn">▶ Verder spelen</button>
    <button id="newSessionBtn">↺ Nieuwe sessie</button>
    <button id="homeStatsBtn">Statistieken</button>
    <button id="homeSettingsBtn">⚙ Instellingen</button>
  </div>
</div>

<div id="pauseOverlay">
  <div class="menuStack">
    <button id="pauseResumeBtn">▶ Verder spelen</button>
    <button id="pauseHomeBtn">🏠 Home</button>
    <button id="pauseNewSessionBtn">↺ Nieuwe sessie</button>
    <button id="pauseSettingsBtn">⚙ Instellingen</button>
  </div>
</div>

<div id="statsOverlay">
  <div class="title">Statistieken</div>
  <div class="statRow"><span class="label">Hoogste level</span><span class="value" id="statsHighLevel">–</span></div>
  <div class="statRow"><span class="label">Hoogste score</span><span class="value" id="statsHighScore">–</span></div>
  <div class="statRow"><span class="label">Cognitive Rating</span><span class="value" id="statsRating">–</span></div>
  <div class="statRow"><span class="label">Correcte antwoorden</span><span class="value" id="statsCorrect">–</span></div>
  <div class="statRow"><span class="label">Speeltijd</span><span class="value" id="statsPlayTime">–</span></div>
  <div class="statRow"><span class="label">Sessies</span><span class="value" id="statsSessions">–</span></div>
  <div class="statRow"><span class="label">Laatste keer gespeeld</span><span class="value" id="statsLastPlayed">–</span></div>
  <button class="close" id="closeStatsOverlay">Sluiten</button>
</div>

<div id="settingsOverlay">
  <div class="title">Instellingen</div>
  <div class="row">
    <span>Geluid</span>
    <button class="toggle" id="toggleSound" aria-label="Geluid aan/uit"><span class="knob"></span></button>
  </div>
  <div class="row">
    <span>Trilling</span>
    <button class="toggle" id="toggleHaptics" aria-label="Trilling aan/uit"><span class="knob"></span></button>
  </div>
  <button class="close" id="closeSettingsOverlay">Sluiten</button>
</div>

<script>
(function () {
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  let dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
  let W = 0, H = 0;

  function resize() {
    // visualViewport reflects the ACTUAL visible area on iOS (accounting for
    // dynamic browser chrome, keyboard, etc.) — clientWidth/clientHeight
    // reflect the layout viewport, which can be larger than what's actually
    // visible. That mismatch is the more likely reason cells kept appearing
    // to sink below the visible screen even after the padding fix.
    const vv = window.visualViewport;
    const cs = getComputedStyle(stage);
    const padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
    const padY = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
    const vw = vv ? vv.width : stage.clientWidth;
    const vh = vv ? vv.height : stage.clientHeight;
    W = vw - padX;
    H = vh - padY;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resize);
    window.visualViewport.addEventListener('scroll', resize);
  }
  resize();

  // ---------- Settings (minimal — audio is currently removed, see notes) ----------
  const SETTINGS_KEY = 'orbit_settings_v1';
  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  let settings = Object.assign({ haptics: true, sound: true }, loadSettings() || {});
  function saveSettings() {
    try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch (e) {}
  }

  function haptic(pattern) {
    if (!settings.haptics) return;
    if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
  }

  // ---------- GameEvents ----------
  // Events are observations, not commands. Gameplay reports that something
  // already happened; it never asks anyone to do anything and never learns
  // what (if anything) reacted. This is the ONLY seam between gameplay and
  // any listening module (AudioManager today; Haptics/Analytics/Achievements/
  // Recording could subscribe later without gameplay ever knowing they exist).
  //
  // Hard rules, enforced by this implementation itself:
  //   - emit() never returns anything meaningful (always undefined)
  //   - emit() never awaits a listener, sync or async
  //   - emit() never throws — a broken listener can't affect gameplay
  //   - emit() is a fast no-op when nothing is listening
  //   - listeners cannot change what emit() does or when it's called
  const GameEvents = (() => {
    const listeners = {};
    return {
      on(event, fn) {
        (listeners[event] || (listeners[event] = [])).push(fn);
      },
      emit(event, data) {
        const fns = listeners[event];
        if (!fns || fns.length === 0) return; // no one listening — do virtually nothing
        for (let i = 0; i < fns.length; i++) {
          try { fns[i](data); } catch (e) { /* a listener's failure is never gameplay's problem */ }
        }
      }
    };
  })();

  // ---------- AudioManager ----------
  // A passive listener, nothing more. It has no reference to phase, cells,
  // scanY, timers, or any other gameplay state — it only knows the events
  // GameEvents hands it. If this whole block were deleted, gameplay would
  // run 100% identically. Sound choices here are the last-tuned values from
  // before audio was pulled out for the stability investigation.
  const AudioManager = (() => {
    let actx = null;
    // A tiny, silent WAV played via a real <audio> element. This is the
    // standard, documented workaround for a long-standing iOS Safari quirk:
    // Web Audio oscillators (what this whole file uses) can be silenced by
    // the physical mute switch, while an <audio> element ignores it. Playing
    // one real <audio> element once, on the same user gesture, "unmutes"
    // the audio session for the oscillators that follow. Has nothing to do
    // with gameplay — purely a platform workaround inside AudioManager.
    const SILENT_WAV = 'data:audio/wav;base64,UklGRlYAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTIAAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgA==';
    let unmuteEl = null;
    let unmuted = false;
    function unmuteIOS() {
      if (unmuted) return;
      unmuted = true;
      try {
        unmuteEl = new Audio(SILENT_WAV);
        unmuteEl.play().catch(() => {});
      } catch (e) {}
    }

    function ensureAudio() {
      unmuteIOS();
      if (!actx) {
        try {
          actx = new (window.AudioContext || window.webkitAudioContext)();
          // Prime the audio graph with an inaudible burst right away. A
          // freshly-created context can take a beat to actually start
          // rendering frames — without this, a real sound scheduled in the
          // same gesture can be silently lost during that startup gap.
          // This exercises the exact same start/stop path as a real tone.
          const primer = actx.createOscillator();
          const primerGain = actx.createGain();
          primerGain.gain.value = 0.0001;
          primer.connect(primerGain).connect(actx.destination);
          primer.start();
          primer.stop(actx.currentTime + 0.05);
        } catch (e) { actx = null; }
      }
      if (actx && actx.state === 'suspended') {
        actx.resume();
      }
    }

    function tone(freq, dur, vol, type, filterHz) {
      if (!actx || !settings.sound) return;
      const t0 = actx.currentTime;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      let node = osc;
      if (filterHz) {
        const filter = actx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(filterHz, t0);
        osc.connect(filter);
        node = filter;
      }
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(vol, t0 + Math.min(0.08, dur * 0.3));
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      node.connect(gain).connect(actx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.05);
    }

    // Sound set "B — Ademend": slow attack on everything (no sharp
    // transients), low register, lowpass-filtered for warmth — reads as a
    // breath rather than a notification chime.
    function playCorrect() {
      tone(440, 0.7, 0.045, 'sine', 1800);
      setTimeout(() => tone(554, 0.65, 0.03, 'sine', 1800), 60);
    }
    function playWrong() {
      tone(300, 0.6, 0.04, 'sine', 1400);
      setTimeout(() => tone(250, 0.7, 0.04, 'sine', 1400), 150);
    }
    function playTick() { tone(400, 0.4, 0.045, 'sine', 1800); }
    function playLevelUp() {
      tone(392, 0.35, 0.04, 'sine', 1800);
      setTimeout(() => tone(494, 0.4, 0.042, 'sine', 1800), 130);
      setTimeout(() => tone(587, 0.6, 0.045, 'sine', 1800), 260);
    }

    // Scanner tone: one low, static note. Starts/stops purely because it
    // was TOLD scannerStarted/scannerFinished happened — it never decides
    // when the scanner starts or ends.
    const SCAN_TONE_TYPE = 'sine';   // was 'triangle' — buzzy/harsh at this low pitch, reads as an alarm-like chime. Sine is smooth and warm.
    const SCAN_TONE_FREQ = 60;       // slightly higher than 44Hz — pure low sines can feel like an inaudible rumble on small phone speakers
    const SCAN_TONE_VOL = 0.055;
    const SCAN_TONE_ATTACK = 0.3;
    const SCAN_TONE_RELEASE = 1.0;
    let scanTone = null;

    function startScanTone() {
      if (!actx || !settings.sound) return;
      stopScanTone();
      const t0 = actx.currentTime;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = SCAN_TONE_TYPE;
      osc.frequency.setValueAtTime(SCAN_TONE_FREQ, t0);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(SCAN_TONE_VOL, t0 + SCAN_TONE_ATTACK);
      osc.connect(gain).connect(actx.destination);
      osc.start(t0);
      scanTone = { osc, gain };
    }
    function stopScanTone() {
      if (!scanTone || !actx) return;
      const t = actx.currentTime;
      const { osc, gain } = scanTone;
      gain.gain.cancelScheduledValues(t);
      gain.gain.setValueAtTime(gain.gain.value, t);
      gain.gain.linearRampToValueAtTime(0, t + SCAN_TONE_RELEASE);
      try { osc.stop(t + SCAN_TONE_RELEASE + 0.1); } catch (e) {}
      scanTone = null;
    }

    GameEvents.on('scannerStarted', startScanTone);
    GameEvents.on('scannerFinished', stopScanTone);
    GameEvents.on('scannerReveal', playTick);
    GameEvents.on('correctAnswer', playCorrect);
    GameEvents.on('wrongAnswer', playWrong);
    GameEvents.on('levelUp', playLevelUp);

    return { ensureAudio };
  })();

  // ---------- Save / Resume ----------
  const SAVE_KEY = 'orbit_save_v1';

  function loadSave() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }

  function defaultSave() {
    return {
      ladderIndex: 0,
      highestLadderIndex: 0,
      score: 0,
      highestScore: 0,
      totalCorrect: 0,
      totalRounds: 0,
      totalPlayTimeMs: 0,
      sessions: 0,
      lastPlayed: null,
      confidenceScore: 50,   // Cognitive Engine V2 — internal, never shown to the player
      currentStreak: 0,
      currentErrorStreak: 0
    };
  }

  let save = loadSave() || defaultSave();
  if (typeof save.sessions !== 'number') save.sessions = 0; // guard against saves from before this field existed
  if (typeof save.confidenceScore !== 'number') save.confidenceScore = 50;
  if (typeof save.currentStreak !== 'number') save.currentStreak = 0;
  if (typeof save.currentErrorStreak !== 'number') save.currentErrorStreak = 0;
  save.sessions++; // one launch of the app = one session, counted immediately (not per round)
  let sessionStart = now();
  let continuousPlayStart = now(); // for the fatigue easing factor — resets on resume/new session, not on every save

  function persistSave() {
    save.totalPlayTimeMs += now() - sessionStart;
    sessionStart = now();
    save.lastPlayed = new Date().toISOString();
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {}
  }

  window.addEventListener('pagehide', persistSave);
  window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') persistSave();
  });

  // Simple, transparent formula: mostly accuracy, with a smaller boost for
  // how far up the ladder the player has reached. 0-100 scale.
  function cognitiveRating(s) {
    if (s.totalRounds === 0) return 0;
    const accuracy = s.totalCorrect / s.totalRounds;
    const levelFactor = Math.min(1, s.highestLadderIndex / LADDER.length);
    return Math.round((accuracy * 0.7 + levelFactor * 0.3) * 100);
  }

  // ---------- Utility ----------
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function now() { return performance.now(); }

  // ---------- Adaptive Memory Ladder ----------
  // Straight from the MASTER GAME FLOW doc: alternates between Tracking
  // (more cells, 1 digit) and Memory (fewer cells, more digits) phases.
  // Deterministic step-through for now — the Cognitive Engine (performance-
  // based speed-up/slow-down) is a separate future layer on top of this.
  const LADDER = [
    // Phase A — Tracking
    { cells: 3, digits: 1 }, { cells: 4, digits: 1 }, { cells: 5, digits: 1 },
    { cells: 6, digits: 1 }, { cells: 7, digits: 1 }, { cells: 8, digits: 1 },
    // Phase B — Memory
    { cells: 5, digits: 2 }, { cells: 6, digits: 2 }, { cells: 7, digits: 2 },
    // Phase C — Tracking
    { cells: 8, digits: 2 }, { cells: 9, digits: 2 }, { cells: 10, digits: 2 },
    // Phase D — Memory
    { cells: 6, digits: 3 }, { cells: 7, digits: 3 }, { cells: 8, digits: 3 },
    // Phase E — Tracking
    { cells: 9, digits: 3 }, { cells: 10, digits: 3 }, { cells: 11, digits: 3 }
  ];
  let ladderIndex = save.ladderIndex || 0;
  let pendingAdjustment = 1; // the Cognitive Engine's decision for the round now resolving: 1 forward, 0 stay, -1 back
  let roundStartTime = 0;    // for reaction-time tracking
  let roundHistory = [];     // { correct, reactionMs } per round, oldest first — the engine's only input

  // ---------- Cognitive Engine V2.0 ----------
  // Deliberately isolated from both the ladder (the fixed training dataset
  // above) and the gameplay loop. Its ONLY output is a navigation decision:
  // move forward through the ladder, stay at the current step, or step
  // back. It never changes what the ladder contains or how a round plays.
  // It knows nothing about physics, scanner, animations, audio, rendering,
  // or UI — only player performance.
  //
  // Interface contract, kept stable across versions so nothing outside this
  // object ever needs to change:
  //   CognitiveEngine.decide(roundHistory) -> -1 | 0 | 1
  //   V1: looked only at the single most recent round.
  //   V2 (previous): a rolling window of the last 5 rounds' accuracy/speed.
  //   V3 (current, "Cognitive Engine V2.0" per spec): an internal,
  //     never-shown Confidence Score (0-100, starts at 50) that every round
  //     nudges up or down based on correctness, reaction time relative to
  //     THIS ladder step's own expected pace, streaks, and error runs. A
  //     level change only fires once the score clears a threshold — a
  //     single round can only move the score a few points, so the decision
  //     is inherently about a trend, not one lucky or unlucky round.
  const CognitiveEngine = {
    ADVANCE_THRESHOLD: 70,
    RETREAT_THRESHOLD: 35,
    RESET_AFTER_ADVANCE: 55, // not back to 50 — keeps a good flow going
    RESET_AFTER_RETREAT: 50,
    FATIGUE_MS: 15 * 60 * 1000, // ~15-20 min continuous play — softens the reaction-time penalty

    // Every ladder step has its own expected pace instead of one fixed
    // limit — fitted to the spec's examples (3 cells≈1s, 5≈2s, 8≈3s;
    // +~700ms per memory point beyond the first).
    expectedReactionMs(cells, digits) {
      const base = Math.max(500, 400 * cells - 200);
      return base + 700 * Math.max(0, digits - 1);
    },

    // roundHistory: [{ correct, reactionMs, cells, digits }], oldest first —
    // only the just-finished round (the last entry) is scored; confidence
    // itself carries the trend forward round to round.
    decide(roundHistory) {
      const last = roundHistory[roundHistory.length - 1];
      if (!last) return 1;

      let delta = 0;

      // Factor 1 — correctness, still the dominant signal
      delta += last.correct ? 4 : -6;

      // Factor 2 — reaction time, judged against this round's OWN expected
      // pace, not a fixed limit. A slow-but-correct player is never
      // punished harshly, and gets even gentler treatment when fatigued.
      const expected = this.expectedReactionMs(last.cells || 3, last.digits || 1);
      const fatigued = (now() - continuousPlayStart) > this.FATIGUE_MS;
      if (last.reactionMs <= expected * 0.75) delta += 2;
      else if (last.reactionMs >= expected * 1.8) delta += fatigued ? 0 : -1;

      // Factor 3 — streak bonus (correct) / Factor 4 — error-run penalty
      // (wrong). One-time bumps exactly at the milestones, not every round.
      if (last.correct) {
        save.currentStreak++;
        save.currentErrorStreak = 0;
        if (save.currentStreak === 3) delta += 2;
        else if (save.currentStreak === 5) delta += 4;
        else if (save.currentStreak === 10) delta += 8;
        else if (save.currentStreak > 10 && save.currentStreak % 5 === 0) delta += 2;

        // Extreme performance: sustained excellence builds confidence a
        // little faster — never skips a level, only accelerates reaching
        // the same ADVANCE_THRESHOLD.
        if (save.currentStreak >= 5 && last.reactionMs <= expected * 0.85) delta += 1;
      } else {
        save.currentErrorStreak++;
        save.currentStreak = 0;
        if (save.currentErrorStreak === 2) delta -= 2;
        else if (save.currentErrorStreak === 3) delta -= 5;
        else if (save.currentErrorStreak >= 4) delta -= 8;
      }

      save.confidenceScore = Math.max(0, Math.min(100, save.confidenceScore + delta));

      if (save.confidenceScore > this.ADVANCE_THRESHOLD) {
        save.confidenceScore = this.RESET_AFTER_ADVANCE;
        return 1;
      }
      if (save.confidenceScore < this.RETREAT_THRESHOLD) {
        save.confidenceScore = this.RESET_AFTER_RETREAT;
        return -1;
      }
      return 0;
    }
  };

  // ---------- Cells ----------
  let cells = [];
  let baseRadius = 34;
  let numCells = 3;

  function computeRadius(n) {
    const scale = Math.min(W, H);
    // Shrinks as the cell count grows so more cells fit comfortably —
    // area occupied scales down roughly with sqrt(3/n).
    const factor = Math.sqrt(3 / n);
    baseRadius = Math.max(32, Math.min(72, scale * 0.125 * factor));
  }

  // Physics tuning — grouped here as named configuration rather than
  // scattered inline literals, values unchanged from what's been tuned/approved.
  const CELL_SPEED_MIN = 24;
  const CELL_SPEED_MAX = 36;
  const COLLISION_BUFFER = 14;   // extra gap kept between cells on top of their radii
  const TAP_HIT_TOLERANCE = 1.6; // multiplier on radius for how forgiving a tap is

  let nextCellId = 1; // stable identity for cells — the cells ARRAY can be mutated mid-round (fade-out purges), array indices cannot be trusted to still point at the same cell later

  function makeCell(x, y) {
    const speed = rand(CELL_SPEED_MIN, CELL_SPEED_MAX);
    const angle = rand(0, Math.PI * 2);
    return {
      id: nextCellId++,
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: baseRadius,
      glow: 0,          // ambient pulse
      reveal: 0,         // 0..1 opacity of digit reveal
      revealUntil: 0,
      revealed: false,   // whether this cell has already shown its content this round
      found: false,      // whether the player has already correctly tapped this cell this round
      burst: 0,          // 0..1 brief scanner-intensity flash at the detection moment
      feedback: 0,        // 0..1 feedback pulse amount
      feedbackColor: null,
      digit: null,
      dying: false,      // true while fading out after being dropped by the ladder
      fadeStart: 0,
      spawning: false,   // true while fading in after being newly added by the ladder
      spawnStart: 0
    };
  }

  const FADE_DURATION = 550;  // ms for a departing cell to fade out
  const SPAWN_DURATION = 550; // ms for a newly arriving cell to fade in — mirrors FADE_DURATION

  let gameStarted = false;

  function spawnTriangle() {
    // Calm, intentional composition for the very first round only: one cell
    // above, two below, forming a triangle. A touch of jitter keeps it organic.
    const jitter = () => rand(-14, 14);
    const cx = W * 0.5;
    const topY = H * 0.34;
    const bottomY = H * 0.62;
    const spread = Math.min(W * 0.19, H * 0.16, baseRadius * 2.6);
    const positions = [
      { x: cx + jitter(),          y: topY + jitter() },
      { x: cx - spread + jitter(), y: bottomY + jitter() },
      { x: cx + spread + jitter(), y: bottomY + jitter() }
    ];
    for (const p of positions) {
      const x = Math.min(Math.max(p.x, baseRadius), W - baseRadius);
      const y = Math.min(Math.max(p.y, baseRadius), H - baseRadius - EDGE_SAFETY_BOTTOM);
      cells.push(makeCell(x, y));
    }
  }

  // Adjusts the live cell count for the new round WITHOUT resetting
  // everything: existing cells keep their position and velocity (the board
  // never jarringly "refreshes"), only the difference between rounds is
  // added or removed.
  function adjustCellCount(n) {
    computeRadius(n);
    for (const c of cells) if (!c.dying) c.r = baseRadius; // radius adapts to new density, but not for cells already fading out

    if (!gameStarted) {
      cells = [];
      spawnTriangle();
      gameStarted = true;
      return;
    }

    const activeIndices = [];
    for (let i = 0; i < cells.length; i++) if (!cells[i].dying) activeIndices.push(i);
    const activeCount = activeIndices.length;

    if (activeCount < n) {
      const marginX = baseRadius;
      const marginYTop = baseRadius;
      const marginYBottom = baseRadius + EDGE_SAFETY_BOTTOM;
      const toAdd = n - activeCount;
      for (let k = 0; k < toAdd; k++) {
        let placed = false;
        for (let attempt = 0; attempt < 200 && !placed; attempt++) {
          const x = rand(marginX, W - marginX);
          const y = rand(marginYTop, H - marginYBottom);
          let ok = true;
          for (const c of cells) {
            if (Math.hypot(x - c.x, y - c.y) < baseRadius * 2.3) { ok = false; break; }
          }
          if (ok) { const nc = makeCell(x, y); nc.spawning = true; nc.spawnStart = now(); cells.push(nc); placed = true; }
        }
        if (!placed) { const nc = makeCell(rand(marginX, W - marginX), rand(marginYTop, H - marginYBottom)); nc.spawning = true; nc.spawnStart = now(); cells.push(nc); }
      }
    } else if (activeCount > n) {
      // Don't remove instantly — mark the excess as dying so they fade out
      // over FADE_DURATION while still drifting naturally. They're purged
      // from the array once fully faded (see frame()).
      let toRemove = activeCount - n;
      while (toRemove > 0 && activeIndices.length > 0) {
        const pick = Math.floor(rand(0, activeIndices.length));
        const idx = activeIndices.splice(pick, 1)[0];
        cells[idx].dying = true;
        cells[idx].fadeStart = now();
        toRemove--;
      }
    }
  }

  // Returns the indices of cells currently participating in the round
  // (i.e. not fading out) — used for target/digit selection and tap hits.
  function activeCellIds() {
    const out = [];
    for (const c of cells) if (!c.dying) out.push(c.id);
    return out;
  }

  // ---------- Physics ----------
  // Only the bottom edge has shown clipping (confirmed: top/left/right are
  // fine) — almost certainly the home-indicator safe area not being fully
  // excluded. So only the bottom gets a dedicated, generous buffer instead
  // of padding all four sides unnecessarily.
  const EDGE_SAFETY_BOTTOM = 50;

  function stepPhysics(dt) {
    for (const c of cells) {
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      clampToWalls(c, true);
    }

    // pairwise soft collisions
    for (let i = 0; i < cells.length; i++) {
      for (let j = i + 1; j < cells.length; j++) {
        const a = cells[i], b = cells[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.hypot(dx, dy);
        const minDist = a.r + b.r + COLLISION_BUFFER;
        if (dist < minDist && dist > 0.0001) {
          const nx = dx / dist, ny = dy / dist;
          // separate
          const overlap = (minDist - dist) / 2;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;
          // elastic exchange along normal (equal mass)
          const avn = a.vx * nx + a.vy * ny;
          const bvn = b.vx * nx + b.vy * ny;
          const diff = bvn - avn;
          a.vx += diff * nx; a.vy += diff * ny;
          b.vx -= diff * nx; b.vy -= diff * ny;
        }
      }
    }

    // Collision separation above can push a cell past a wall boundary after
    // the earlier wall-clamp already ran this frame (it only checks pairwise
    // distance, not screen bounds). Re-clamp everyone here so no cell ever
    // renders outside the visible play area, even mid-collision near an edge.
    for (const c of cells) clampToWalls(c, false);
  }

  // Keeps a cell within the play area. `force`: true means "this cell just
  // moved into the wall this frame, always bounce" (used right after
  // movement); false means "only bounce if still heading further into the
  // wall" (used after collision separation, so we don't re-flip a cell that
  // a collision already sent the other way).
  function clampToWalls(c, force) {
    const pad = c.r;
    const padBottom = c.r + EDGE_SAFETY_BOTTOM;
    if (c.x < pad) { c.x = pad; if (force || c.vx < 0) c.vx = Math.abs(c.vx); }
    if (c.x > W - pad) { c.x = W - pad; if (force || c.vx > 0) c.vx = -Math.abs(c.vx); }
    if (c.y < pad) { c.y = pad; if (force || c.vy < 0) c.vy = Math.abs(c.vy); }
    if (c.y > H - padBottom) { c.y = H - padBottom; if (force || c.vy > 0) c.vy = -Math.abs(c.vy); }
  }

  // ---------- Game state ----------
  const PHASE = { INTRO: 'intro', SCAN: 'scan', MEMORY: 'memory', FEEDBACK: 'feedback' };
  let phase = PHASE.INTRO;
  let phaseStart = 0;

  let scanY = 0;
  let scanDuration = 0;
  let roundTargets = new Set();  // indices of cells holding a digit this round
  let roundFound = 0;            // how many of those have been correctly tapped so far

  const INTRO_DELAY = 350; // gameplay pacing, unchanged from before audio — audio adapts to this, never the other way around
  const FEEDBACK_DURATION = 500;
  const REVEAL_DURATION = 600; // ms digit stays visible
  const REVEAL_TOLERANCE = 10; // px band around scan line to trigger reveal

  // Locked to one exact, constant speed — no randomness left in it at all.
  const SCAN_CROSS_DURATION = 4500; // ms to cross the visible screen (H)

  function startRound() {
    phase = PHASE.INTRO;
    phaseStart = now();

    // Ladder navigation: the fixed dataset (LADDER) never changes — only
    // WHERE we are in it moves, per the Cognitive Engine's last decision.
    // Clamped so it can never go before the start of the ladder.
    ladderIndex = Math.max(0, ladderIndex + pendingAdjustment);
    pendingAdjustment = 1; // default if the round isn't finished by the engine's usual path (shouldn't normally happen)

    const step = LADDER[ladderIndex % LADDER.length];
    numCells = step.cells;

    adjustCellCount(numCells);

    // pick `step.digits` unique ACTIVE cells to hold a number this round —
    // never a cell that's currently fading out. Tracked by stable id, NOT
    // array index — the cells array can be mutated mid-round (fade-out
    // purges in frame()), which would silently point roundTargets at the
    // wrong cell if it were index-based. This was the root cause of taps
    // randomly registering as wrong/missed.
    const ids = activeCellIds();
    for (let i = ids.length - 1; i > 0; i--) {
      const j = Math.floor(rand(0, i + 1));
      [ids[i], ids[j]] = [ids[j], ids[i]];
    }
    roundTargets = new Set(ids.slice(0, step.digits));
    roundFound = 0;

    for (const c of cells) {
      if (c.dying) continue; // leave fading cells alone — they're not part of this round
      c.digit = roundTargets.has(c.id) ? true : null;
      c.reveal = 0;
      c.revealed = false;
      c.found = false;
      c.feedback = 0;
      c.feedbackColor = null;
    }

    save.highestLadderIndex = Math.max(save.highestLadderIndex, ladderIndex);
    persistSave();
  }

  function beginScan() {
    phase = PHASE.SCAN;
    phaseStart = now();
    scanFullyEntered = false;
    scanEnteredPulseAt = -1;
    scannerEnteredField = false;
    scannerLeftField = false;
    scanY = H + SCAN_START_OFFSET;
    // The extra off-screen padding needed for the trail travels at that same
    // fixed speed, added proportionally, so trail length never changes it.
    const travel = H + SCAN_START_OFFSET * 2;
    scanDuration = SCAN_CROSS_DURATION * (travel / H);
  }

  let memorySignalAt = -1; // timestamp of the full-screen "you can tap now" flash

  function beginMemory() {
    phase = PHASE.MEMORY;
    phaseStart = now();
    roundStartTime = now(); // reaction time counts from HERE — when the player can actually respond — not from round start (which would always include the ~5-7s mandatory scan wait)
    memorySignalAt = now();
  }

  // Immediate, player-facing acknowledgment of a tap — the pulse ring and
  // its haptic. This is cell behavior, not scanner behavior, so it always
  // happens right at tap time, even mid-scan.
  function pulseTapFeedback(correct, cellIndex) {
    const c = cells[cellIndex];
    c.feedback = 1;
    c.feedbackColor = correct ? 'white' : 'red';
    if (correct) { haptic(12); retriggerReveal(c); GameEvents.emit('correctAnswer'); }
    else { haptic([10, 40, 10]); GameEvents.emit('wrongAnswer'); }
  }

  // Replays the same dark "reveal" the cell showed when the scanner first
  // read it — a confirmation echo, so tapping the right cell mirrors the
  // moment that made it the right one.
  function retriggerReveal(c) {
    c.revealed = true;
    c.revealUntil = now() + REVEAL_DURATION;
  }

  // The actual round conclusion: bookkeeping, the Cognitive Engine
  // decision, save, and the phase change that starts the next round timer.
  // This is scanner-paced — it never runs until the scanner has genuinely
  // finished its pass, per "de scanner reageert nooit op de speler".
  function resolveRound(correct) {
    phase = PHASE.FEEDBACK;
    phaseStart = now();

    save.totalRounds++;
    if (correct) {
      save.totalCorrect++;
      save.score += numCells + roundTargets.size * 2;
    }
    const reactionMs = now() - roundStartTime;
    roundHistory.push({ correct, reactionMs, cells: numCells, digits: roundTargets.size });
    if (roundHistory.length > 50) roundHistory.shift();
    pendingAdjustment = CognitiveEngine.decide(roundHistory);
    if (pendingAdjustment === 1) GameEvents.emit('levelUp'); // observation only — the decision itself is already made

    save.highestScore = Math.max(save.highestScore, save.score);
    save.ladderIndex = ladderIndex;
    persistSave();
  }

  // A correct tap that isn't the round's last remaining target — the round
  // continues, but the cell still gets its own pulse of confirmation.
  function pulseFound(cellIndex) {
    const c = cells[cellIndex];
    c.feedback = 1;
    c.feedbackColor = 'white';
    haptic(10);
    retriggerReveal(c);
    GameEvents.emit('correctAnswer'); // observation only — this was missing, which is why only the LAST correct tap of a multi-target round made a sound
  }

  // The scanner is a device, not an animation the player controls: it
  // always completes its full pass, at its own fixed pace. The memory
  // phase — and therefore any tap — only begins once the scanner has
  // fully left the screen. This deliberately keeps two cognitive tasks
  // fully separate: observe/track/remember DURING the scan, then
  // recall/recognize/choose only AFTER it — never both at once.

  // ---------- Interaction ----------
  function handleTap(clientX, clientY) {
    if (phase !== PHASE.MEMORY) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    let hitIndex = -1;
    let bestDist = Infinity;
    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      if (c.dying) continue;
      const d = Math.hypot(x - c.x, y - c.y);
      if (d <= c.r * TAP_HIT_TOLERANCE && d < bestDist) { bestDist = d; hitIndex = i; }
    }
    if (hitIndex === -1) return;

    const c = cells[hitIndex];
    // Checked by stable id, not array index — the cells array can be
    // mutated between round-start and this tap (fade-out purges), so the
    // index roundTargets was built from may no longer point at the same
    // cell. This was the actual bug behind taps registering inconsistently.
    const isTarget = roundTargets.has(c.id) && !c.found;

    if (isTarget) {
      c.found = true;
      roundFound++;
      if (roundFound >= roundTargets.size) {
        // last target found — round complete
        pulseTapFeedback(true, hitIndex);
        resolveRound(true);
      } else {
        // more targets still to find — stay in memory phase
        pulseFound(hitIndex);
      }
    } else {
      // wrong cell (or an already-found one tapped again) — round over.
      // The scanner has already finished its scan by now, so there's
      // nothing for it to react to — it simply isn't involved anymore.
      pulseTapFeedback(false, hitIndex);
      resolveRound(false);
    }
  }

  canvas.addEventListener('pointerdown', (e) => {
    AudioManager.ensureAudio(); // must unlock before handleTap can trigger any sound-emitting event
    handleTap(e.clientX, e.clientY);
  }, { passive: true });

  // ---------- Rendering ----------
  function drawBackground() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
  }

  const FEEDBACK_DECAY = 0.90; // multiplicative per frame — ease-out curve instead of a linear fade
  const BURST_DECAY = 0.85;    // multiplicative per frame

  // Advances a cell's time-based visual state (ambient glow breathing,
  // feedback pulse decay, detection-burst decay, reveal fade). Kept
  // separate from drawCell so "update" and "draw" aren't tangled into one
  // responsibility. Phase-independent — the reveal fade needs to keep
  // animating even during MEMORY (a tap-confirmation re-flash), not just
  // while updateScan() is running.
  function updateCellDecay(c, t) {
    c.glow = 0.5 + 0.5 * Math.sin(t / 1400 + (c.x + c.y) * 0.001);

    if (c.feedback > 0) {
      c.feedback *= FEEDBACK_DECAY;
      if (c.feedback < 0.01) c.feedback = 0;
    }
    if (c.burst > 0) {
      c.burst *= BURST_DECAY;
      if (c.burst < 0.01) c.burst = 0;
    }
    if (c.revealed && c.revealUntil > 0) {
      const remain = c.revealUntil - t;
      if (remain > 0) {
        const elapsedFrac = 1 - (remain / REVEAL_DURATION); // 0 -> 1
        if (elapsedFrac < 0.15) c.reveal = elapsedFrac / 0.15;
        else if (elapsedFrac > 0.85) c.reveal = (1 - elapsedFrac) / 0.15;
        else c.reveal = 1;
      } else {
        c.reveal = 0;
        c.revealUntil = 0;
      }
    }
  }

  function drawCell(c) {
    const t = now();
    updateCellDecay(c, t);

    ctx.save();
    ctx.translate(c.x, c.y);

    // Light "trembling" reaction for a wrong tap — a few px of quick jitter
    // that decays with the pulse itself. Not a shake, just a soft flinch.
    if (c.feedback > 0 && c.feedbackColor === 'red') {
      const shakeAmt = 2.2 * c.feedback;
      ctx.translate(
        Math.sin(t * 0.09 + c.id) * shakeAmt,
        Math.cos(t * 0.11 + c.id) * shakeAmt * 0.6
      );
    }
    // Subtle ±2% scale pulse for a correct tap — pops immediately, settles
    // straight back as the pulse decays.
    if (c.feedback > 0 && c.feedbackColor === 'white') {
      const scaleMul = 1 + 0.02 * c.feedback;
      ctx.scale(scaleMul, scaleMul);
    }

    let fadeAlpha = 1;
    if (c.dying) {
      const fadeProgress = Math.min(1, (t - c.fadeStart) / FADE_DURATION);
      fadeAlpha = Math.max(0, 1 - fadeProgress);
      ctx.globalAlpha = fadeAlpha;
    } else if (c.spawning) {
      const spawnProgress = Math.min(1, (t - c.spawnStart) / SPAWN_DURATION);
      // ease-out (1 - (1-x)^2) — starts quickly, settles gently, feels less
      // mechanical than a linear fade
      fadeAlpha = 1 - Math.pow(1 - spawnProgress, 2);
      ctx.globalAlpha = fadeAlpha;
      if (spawnProgress >= 1) c.spawning = false;
    }

    // feedback ring
    if (c.feedback > 0) {
      const isWrong = c.feedbackColor === 'red';
      const ringR = c.r + (1 - c.feedback) * (isWrong ? 58 : 46);
      const alpha = c.feedback * (isWrong ? 0.75 : 0.55);

      // secondary soft red bloom behind the ring — makes a wrong tap read
      // clearly without becoming harsh or flashy
      if (isWrong) {
        const bloomR = c.r * (1.4 + (1 - c.feedback) * 0.5);
        const bloom = ctx.createRadialGradient(0, 0, c.r * 0.6, 0, 0, bloomR);
        bloom.addColorStop(0, `rgba(255,60,60,${c.feedback * 0.28})`);
        bloom.addColorStop(1, 'rgba(255,60,60,0)');
        ctx.fillStyle = bloom;
        ctx.beginPath();
        ctx.arc(0, 0, bloomR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(0, 0, ringR, 0, Math.PI * 2);
      ctx.lineWidth = isWrong ? 4 : 3;
      ctx.strokeStyle = c.feedbackColor === 'white'
        ? `rgba(255,255,255,${alpha})`
        : `rgba(255,64,64,${alpha})`;
      ctx.shadowColor = c.feedbackColor === 'white' ? 'rgba(255,255,255,0.8)' : 'rgba(255,64,64,0.95)';
      ctx.shadowBlur = isWrong ? 26 : 18;
      ctx.stroke();
    }

    // outer glow — intensifies sharply during the burst, gently during reveal
    ctx.shadowColor = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 20 + c.glow * 9 + c.burst * 40;

    const revealScale = 1 + c.burst * 0.06;
    const R = c.r * revealScale;

    // soft pearl material: minimal, smooth, barely-there sheen — brightens
    // toward pure white during a reveal for the "glowing from within" moment.
    // The highlight position drifts very slowly per-cell, like a soft
    // reflection catching ambient light as the cell drifts — not tied to
    // velocity (kept simple), just a slow living motion.
    const driftAngle = t * 0.00035 + c.id * 2.399;
    const driftX = Math.cos(driftAngle) * R * 0.035;
    const driftY = Math.sin(driftAngle) * R * 0.035;

    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    const lift = c.burst; // only the brief detection-burst brightens the material now — reveal darkens instead (see below)
    const material = ctx.createRadialGradient(
      -R * 0.15 + driftX, -R * 0.2 + driftY, R * 0.2,
      0, 0, R * 1.05
    );
    material.addColorStop(0, `rgba(255,255,255,${0.97 + lift * 0.03})`);
    material.addColorStop(0.7, `rgba(${240 + lift * 15},${240 + lift * 15},${244 + lift * 11},0.95)`);
    material.addColorStop(1, `rgba(${222 + lift * 33},${224 + lift * 31},${230 + lift * 25},${0.92 + lift * 0.06})`);
    ctx.fillStyle = material;
    ctx.fill();

    ctx.shadowBlur = 0;

    // barely-there sheen — soft, broad, no hard glint — drifts with the material highlight
    ctx.beginPath();
    ctx.ellipse(-R * 0.2 + driftX, -R * 0.24 + driftY, R * 0.34, R * 0.22, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.2 + lift * 0.15})`;
    ctx.fill();

    // reveal — the whole cell darkens, near-black, instead of lighting up.
    // On a white-cells/black-background world, going DARK reads as far more
    // distinctive than getting brighter — as if the scanner is draining the
    // cell to read it, not illuminating it.
    if (c.reveal > 0 && c.digit !== null) {
      ctx.beginPath();
      ctx.arc(0, 0, R, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${c.reveal * 0.82})`;
      ctx.fill();
    }

    ctx.restore();
  }

  const SCAN_CORE_WIDTH = 2;    // aura width around the hairline — kept tight, not thick
  const SCAN_LEAD = 10;          // tight fade just ahead of the core (direction of travel)
  const SCAN_TRAIL = 140;        // long billowing trail behind it
  const SCAN_START_OFFSET = SCAN_TRAIL + 30; // keep fully off-screen at both ends

  function drawScan() {
    if (phase !== PHASE.SCAN) return;
    const t = now();
    ctx.save();

    // Subtle, irregular flicker — feels like energy running through the
    // beam, without ever becoming distracting or strobe-like. Scaled by
    // scanIntensity so the whole beam swells in as it enters the screen
    // and holds steady once fully visible, instead of snapping to full
    // brightness immediately.
    const flicker = (0.88
      + 0.09 * Math.sin(t * 0.0075)
      + 0.05 * Math.sin(t * 0.0331 + 1.7)) * scanIntensity;

    // Asymmetric streak: almost no glow ahead of the core (it's heading
    // into darkness), but a long trail behind it that flares brightest
    // just behind the core — as if the energy billows out — then wanes
    // gradually to nothing.
    const top = scanY - SCAN_LEAD;
    const bottom = scanY + SCAN_TRAIL;
    const span = bottom - top;
    const corePos = SCAN_LEAD / span;

    const grad = ctx.createLinearGradient(0, top, 0, bottom);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(Math.max(0, corePos - 0.03), `rgba(255,255,255,${0.05 * flicker})`);
    grad.addColorStop(corePos, `rgba(255,255,255,${0.34 * flicker})`);
    const trailStops = [
      [0.08, 0.30], [0.22, 0.22], [0.42, 0.13], [0.64, 0.07], [0.85, 0.025], [1.0, 0]
    ];
    for (const [frac, alpha] of trailStops) {
      const pos = Math.min(1, corePos + frac * (1 - corePos));
      grad.addColorStop(pos, `rgba(255,255,255,${alpha * flicker})`);
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, top, W, span);

    // Soft aura behind the core — gives it bloom without softening the edge itself
    ctx.shadowColor = 'rgba(255,255,255,0.9)';
    ctx.shadowBlur = 16 * flicker;
    ctx.fillStyle = `rgba(255,255,255,${0.45 * flicker})`;
    ctx.fillRect(0, scanY - SCAN_CORE_WIDTH / 2, W, SCAN_CORE_WIDTH);
    ctx.shadowBlur = 0;

    // Razor-sharp hairline on top — pixel-snapped, no blur, flinterdun and near-white-hot
    const coreY = Math.round(scanY);
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, 1.0 * flicker)})`;
    ctx.fillRect(0, coreY, W, 1);

    // A single, brief light-pulse the instant the beam is fully swelled in
    // — the scanner "arriving" at full strength. Pure light, no new motion.
    if (scanEnteredPulseAt >= 0) {
      const pulseAge = t - scanEnteredPulseAt;
      const PULSE_DURATION = 220;
      if (pulseAge < PULSE_DURATION) {
        const pulseFrac = 1 - pulseAge / PULSE_DURATION; // 1 -> 0
        ctx.shadowColor = 'rgba(255,255,255,0.95)';
        ctx.shadowBlur = 34 * pulseFrac;
        ctx.fillStyle = `rgba(255,255,255,${0.4 * pulseFrac})`;
        ctx.fillRect(0, coreY - 1, W, 3);
        ctx.shadowBlur = 0;
      }
    }

    drawScanBursts();
    ctx.restore();
  }

  function drawScanBursts() {
    // The cell itself lights up from within right as the beam finds it —
    // the digit appears exactly in the core of the scan
    for (const c of cells) {
      if (c.burst > 0) {
        const bx = c.x, by = c.y;
        const r = c.r * (2.4 + c.burst * 1.4);
        const hot = ctx.createRadialGradient(bx, by, 0, bx, by, r);
        const a = c.burst * 0.5;
        hot.addColorStop(0, `rgba(255,255,255,${a})`);
        hot.addColorStop(0.5, `rgba(255,255,255,${a * 0.35})`);
        hot.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hot;
        ctx.beginPath();
        ctx.arc(bx, by, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ---------- Main loop ----------
  let lastT = now();

  let scanIntensity = 1;    // 0..1 — swells in on entry, stable while visible, fades on exit
  const SCAN_EDGE_RAMP_MS = 350; // exact ms for both the entry swell and the exit fade — not a fraction of scanDuration, so it's identical regardless of screen size or trail length
  let scanEnteredPulseAt = -1;   // timestamp of the light-pulse fired once the beam is fully in — reset each round
  let scanFullyEntered = false;
  let scannerEnteredField = false; // for the scannerStarted observation — separate from the visual entrance-pulse flag above
  let scannerLeftField = false;    // for the scannerFinished observation

  function updateScan(t) {
    const elapsed = t - phaseStart;
    const prog = Math.min(1, elapsed / scanDuration);
    const travel = H + SCAN_START_OFFSET * 2;
    // Linear, not eased — a real scanner sweeps at one constant speed,
    // it doesn't slow down at the start/end of its pass.
    scanY = H + SCAN_START_OFFSET - prog * travel;

    // Entry/exit timing pinned to the beam's actual presence in the
    // visible play field (y between 0 and H), not to the phase's full
    // duration (which includes off-screen buffer for the trail).
    const progEnter = SCAN_START_OFFSET / travel;
    const progExit = (H + SCAN_START_OFFSET) / travel;
    const msSinceEnter = (prog - progEnter) * scanDuration;
    const msUntilExit = (progExit - prog) * scanDuration;
    const enterRamp = prog < progEnter ? 0 : Math.min(1, msSinceEnter / SCAN_EDGE_RAMP_MS);
    const exitRamp = prog > progExit ? 0 : Math.min(1, msUntilExit / SCAN_EDGE_RAMP_MS);
    scanIntensity = Math.min(enterRamp, exitRamp);

    // Observation only — the beam has just become present in the visible
    // field. Fires once per pass; changes nothing about the pass itself.
    if (!scannerEnteredField && prog >= progEnter) {
      scannerEnteredField = true;
      GameEvents.emit('scannerStarted');
    }

    // A single, brief light-pulse the moment the beam is fully swelled in
    // (once per round) — the scanner "arriving" at full strength.
    if (!scanFullyEntered && enterRamp >= 1) {
      scanFullyEntered = true;
      scanEnteredPulseAt = t;
    }

    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      if (!c.revealed && c.digit !== null) {
        if (Math.abs(c.y - scanY) < REVEAL_TOLERANCE + c.r * 0.5) {
          c.revealed = true;
          c.revealUntil = t + REVEAL_DURATION;
          c.burst = 1;
          GameEvents.emit('scannerReveal'); // observation only
        }
      }
    }

    // Observation only — the beam has just left the visible field. Fires
    // once per pass, exactly at the same position-based moment the light
    // itself finishes fading out (see drawScan's exitRamp).
    if (!scannerLeftField && prog >= progExit) {
      scannerLeftField = true;
      GameEvents.emit('scannerFinished');
    }

    if (prog >= 1) {
      for (const c of cells) c.reveal = 0;
      beginMemory();
    }
  }

  let paused = false;
  let pauseStartedAt = 0;

  function pauseGame() {
    if (paused) return;
    paused = true;
    pauseStartedAt = now();
    persistSave();
  }

  function resumeGame() {
    if (!paused) return;
    const pausedMs = now() - pauseStartedAt;
    // Shift the round's clocks forward by exactly how long we were paused,
    // so the scan resumes from precisely where it left off instead of
    // jumping ahead (or the intro/feedback timers firing instantly).
    phaseStart += pausedMs;
    roundStartTime += pausedMs;
    paused = false;
    continuousPlayStart = now(); // a break resets the fatigue clock — the player just rested
    // A break also resets streak MOMENTUM (not confidence score, not ladder
    // position) — otherwise one rusty mistake right after returning gets
    // treated as a continuation of an old error run and causes an unfairly
    // large drop, which is exactly the "zak je te ver terug" complaint.
    save.currentStreak = 0;
    save.currentErrorStreak = 0;
  }

  function frame() {
    const t = now();
    if (paused) {
      lastT = t; // keep the clock current so resuming doesn't jump dt/phaseStart-relative timers forward
      requestAnimationFrame(frame);
      return;
    }
    const dt = Math.min(0.032, (t - lastT) / 1000);
    lastT = t;

    stepPhysics(dt);
    drawBackground();

    if (phase === PHASE.INTRO) {
      if (t - phaseStart > INTRO_DELAY) beginScan();
    } else if (phase === PHASE.SCAN) {
      updateScan(t);
    } else if (phase === PHASE.FEEDBACK) {
      if (t - phaseStart > FEEDBACK_DURATION) startRound();
    }

    drawScan();
    for (const c of cells) drawCell(c);
    drawMemorySignal(t);

    // Purge cells that finished fading out (they've already had their
    // last, fully-transparent frame rendered above).
    if (cells.some((c) => c.dying && (t - c.fadeStart) >= FADE_DURATION)) {
      cells = cells.filter((c) => !(c.dying && (t - c.fadeStart) >= FADE_DURATION));
    }

    requestAnimationFrame(frame);
  }

  const MEMORY_SIGNAL_DURATION = 220; // ms — quick enough to never feel like a delay, clear enough to register as "go"

  function drawMemorySignal(t) {
    if (memorySignalAt < 0) return;
    const elapsed = t - memorySignalAt;
    if (elapsed >= MEMORY_SIGNAL_DURATION) { memorySignalAt = -1; return; }
    const fade = 1 - elapsed / MEMORY_SIGNAL_DURATION; // 1 -> 0, ease via a squared falloff below
    ctx.fillStyle = `rgba(255,255,255,${0.35 * fade * fade})`;
    ctx.fillRect(0, 0, W, H);
  }

  function launchGame() {
    continuousPlayStart = now();
    save.currentStreak = 0;
    save.currentErrorStreak = 0;
    startRound();
    requestAnimationFrame(frame);
  }

  function startNewSession() {
    // Resets the CURRENT run's position in the ladder and current score —
    // lifetime stats (highest score/level, totals, play time) are kept.
    ladderIndex = 0;
    pendingAdjustment = 1;
    roundHistory = [];
    save.ladderIndex = 0;
    save.score = 0;
    save.confidenceScore = 50;
    save.currentStreak = 0;
    save.currentErrorStreak = 0;
    continuousPlayStart = now();
    persistSave();
  }

  // ---------- Navigation ----------
  const welcomeEl = document.getElementById('welcome');
  const pauseOverlayEl = document.getElementById('pauseOverlay');
  const settingsOverlayEl = document.getElementById('settingsOverlay');
  const statsOverlayEl = document.getElementById('statsOverlay');
  const scannerIndicatorEl = document.getElementById('scannerIndicator');
  const hapticsToggleEl = document.getElementById('toggleHaptics');
  const soundToggleEl = document.getElementById('toggleSound');

  let gameLaunched = false;
  let settingsReturnTo = 'pause'; // 'pause' | 'home' — which screen re-appears when Settings closes

  function refreshHomeStats() {
    document.getElementById('statLevel').textContent = String(save.ladderIndex + 1);
    document.getElementById('statHighLevel').textContent = String(save.highestLadderIndex + 1);
    document.getElementById('statScore').textContent = String(save.highestScore);
    document.getElementById('statRating').textContent = String(cognitiveRating(save));
  }

  // Minimalist duration formatting — "45m", "2u 15m", never raw ms.
  function formatPlayTime(ms) {
    const totalMinutes = Math.floor(ms / 60000);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    if (hours > 0) return `${hours}u ${minutes}m`;
    return `${minutes}m`;
  }

  function formatLastPlayed(iso) {
    if (!iso) return 'Nu (eerste keer)';
    const d = new Date(iso);
    const today = new Date();
    const sameDay = d.toDateString() === today.toDateString();
    if (sameDay) {
      return `Vandaag, ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    }
    return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function refreshStatsOverlay() {
    // Includes the current, not-yet-persisted portion of this session so
    // the number feels alive rather than stuck at the last save point.
    const liveMs = save.totalPlayTimeMs + (now() - sessionStart);
    document.getElementById('statsHighLevel').textContent = String(save.highestLadderIndex + 1);
    document.getElementById('statsHighScore').textContent = String(save.highestScore);
    document.getElementById('statsRating').textContent = String(cognitiveRating(save));
    document.getElementById('statsCorrect').textContent = String(save.totalCorrect);
    document.getElementById('statsPlayTime').textContent = formatPlayTime(liveMs);
    document.getElementById('statsSessions').textContent = String(save.sessions);
    document.getElementById('statsLastPlayed').textContent = formatLastPlayed(save.lastPlayed);
  }

  function updateIndicatorVisibility() {
    const anyOverlayOpen = !welcomeEl.classList.contains('hidden')
      || pauseOverlayEl.classList.contains('visible')
      || settingsOverlayEl.classList.contains('visible')
      || statsOverlayEl.classList.contains('visible');
    scannerIndicatorEl.classList.toggle('hidden', anyOverlayOpen || !gameLaunched);
  }

  function goToGameplay() {
    welcomeEl.classList.add('hidden');
    pauseOverlayEl.classList.remove('visible');
    if (!gameLaunched) {
      gameLaunched = true;
      launchGame();
    } else {
      resumeGame();
    }
    updateIndicatorVisibility();
  }

  function showHome() {
    pauseOverlayEl.classList.remove('visible');
    settingsOverlayEl.classList.remove('visible');
    statsOverlayEl.classList.remove('visible');
    refreshHomeStats();
    welcomeEl.classList.remove('hidden');
    updateIndicatorVisibility();
  }

  function openPause() {
    pauseGame();
    pauseOverlayEl.classList.add('visible');
    updateIndicatorVisibility();
  }

  function openStats() {
    refreshStatsOverlay();
    statsOverlayEl.classList.add('visible');
    updateIndicatorVisibility();
  }

  function closeStats() {
    statsOverlayEl.classList.remove('visible');
    showHome();
  }

  function openSettings(returnTo) {
    settingsReturnTo = returnTo;
    pauseOverlayEl.classList.remove('visible');
    settingsOverlayEl.classList.add('visible');
    updateIndicatorVisibility();
  }

  function closeSettings() {
    settingsOverlayEl.classList.remove('visible');
    if (settingsReturnTo === 'home') showHome();
    else pauseOverlayEl.classList.add('visible');
    updateIndicatorVisibility();
  }

  // The single subtle interaction point during gameplay
  // Requires a brief hold (not a simple tap) — a normal tap on a cell that
  // happens to be floating near the top must never accidentally open the
  // menu. A deliberate ~350ms hold is unambiguous; a quick tap does nothing.
  const INDICATOR_HOLD_MS = 350;
  let indicatorHoldTimer = null;
  scannerIndicatorEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    clearTimeout(indicatorHoldTimer);
    indicatorHoldTimer = setTimeout(openPause, INDICATOR_HOLD_MS);
  });
  scannerIndicatorEl.addEventListener('pointerup', () => clearTimeout(indicatorHoldTimer));
  scannerIndicatorEl.addEventListener('pointerleave', () => clearTimeout(indicatorHoldTimer));
  scannerIndicatorEl.addEventListener('pointercancel', () => clearTimeout(indicatorHoldTimer));

  // Pause menu
  document.getElementById('pauseResumeBtn').addEventListener('click', goToGameplay);
  document.getElementById('pauseHomeBtn').addEventListener('click', () => { persistSave(); showHome(); });
  document.getElementById('pauseNewSessionBtn').addEventListener('click', () => {
    startNewSession();
    pauseOverlayEl.classList.remove('visible');
    if (!gameLaunched) { gameLaunched = true; launchGame(); }
    else { resumeGame(); startRound(); }
    updateIndicatorVisibility();
  });
  document.getElementById('pauseSettingsBtn').addEventListener('click', () => openSettings('pause'));

  // Home menu
  document.getElementById('resumeBtn').addEventListener('click', goToGameplay);
  document.getElementById('newSessionBtn').addEventListener('click', () => {
    startNewSession();
    welcomeEl.classList.add('hidden');
    if (!gameLaunched) { gameLaunched = true; launchGame(); }
    else { resumeGame(); startRound(); }
    updateIndicatorVisibility();
  });
  document.getElementById('homeSettingsBtn').addEventListener('click', () => openSettings('home'));
  document.getElementById('homeStatsBtn').addEventListener('click', openStats);
  document.getElementById('closeStatsOverlay').addEventListener('click', closeStats);

  // Settings
  function refreshSettingsUI() {
    hapticsToggleEl.classList.toggle('on', settings.haptics);
    soundToggleEl.classList.toggle('on', settings.sound);
  }
  refreshSettingsUI();
  hapticsToggleEl.addEventListener('click', () => {
    settings.haptics = !settings.haptics;
    saveSettings();
    refreshSettingsUI();
  });
  soundToggleEl.addEventListener('click', () => {
    settings.sound = !settings.sound;
    saveSettings();
    refreshSettingsUI();
  });
  document.getElementById('closeSettingsOverlay').addEventListener('click', closeSettings);

  // Auto-save whenever the app is backgrounded or closed (in addition to
  // the existing end-of-round save) — the player never has to think about it.
  window.addEventListener('pagehide', () => { if (paused) return; persistSave(); });

  if (save.totalRounds > 0) {
    showHome();
  } else {
    gameLaunched = true;
    launchGame();
    updateIndicatorVisibility();
  }

  // Web Audio requires a user gesture to unlock — purely an audio concern,
  // kept entirely separate from gameplay's own pointerdown handling.
  window.addEventListener('pointerdown', AudioManager.ensureAudio, { once: true });

  // Belt-and-suspenders against iOS Safari's bounce/rubber-band scroll,
  // which can shift the whole page during a drag even with touch-action:
  // none in some standalone-PWA edge cases — this is very likely what
  // looked like cells "sinking below the screen" during interaction.
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gesturestart', (e) => e.preventDefault());
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
